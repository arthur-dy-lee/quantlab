data_root: data/
offline_only: false
adjust_default: qfq                    # raw | qfq | hfq
stats_min_samples: 30
retry: { retries: 3, backoff: 1.5 }

markets:                               # 市场 → 源 路由
  CN: { source: akshare }
  HK: { source: akshare }
  US: { source: yfinance }
  CRYPTO: { source: ccxt, exchange: kraken }   # Binance 451 → kraken

watchlists:                            # 主题标的池(个股 + ETF 混合)
  机器人:   [CN:159819, CN:300024]
  AI:       [US:QQQ, CN:159819]
  智能制造: [CN:516960]
  # 美股七姐妹 + 纳指（SpaceX 未上市、无代码，不含）
  美股科技: [US:AAPL, US:MSFT, US:GOOGL, US:AMZN, US:META, US:NVDA, US:TSLA, US:^IXIC]
  # 科技/AI 主题 ETF
  科技AI_ETF: [US:QQQ, US:XLK, US:SMH, US:SOXX, US:ARKK, US:BOTZ, US:AIQ, US:IGV]
  # 主流加密前十(参考币安市值, 排除稳定币; kraken 现货)
  加密主流: [CRYPTO:BTC/USDT, CRYPTO:ETH/USDT, CRYPTO:BNB/USDT, CRYPTO:SOL/USDT,
            CRYPTO:XRP/USDT, CRYPTO:DOGE/USDT, CRYPTO:ADA/USDT, CRYPTO:TRX/USD,
            CRYPTO:AVAX/USDT, CRYPTO:LINK/USDT]

sizing:
  method: fixed_tier                   # fixed_tier | kelly_conservative
  max_position: 0.5
  kelly_fraction: 0.3

notify:
  channels: [console]                  # 默认 console; 配好后加 feishu
  throttle_minutes: 30
  feishu:
    webhook: ${FEISHU_WEBHOOK}         # 走环境变量, 不入库/不进 git
    secret: ${FEISHU_SECRET}
